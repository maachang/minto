<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>minto - GAS oAuth 実行中</title>
    <script src="/assets/jsonp.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
        .card { background: #fff; padding: 2rem 3rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; max-width: 480px; }
        .btn { display: inline-block; margin-top: 1rem; padding: 0.6rem 1.4rem; background: #4285f4; color: #fff; border-radius: 4px; text-decoration: none; }
        .error { color: #c0392b; }
    </style>
</head>

<body>
    <div class="card">
        <div id="view">読み込み中...</div>
    </div>

    <script>
        // HttpGetパラメータを取得(値はdecodeURIComponent済み).
        const httpGetParams = function () {
            const ret = {};
            new URL(location.href).searchParams.forEach(function (v, k) {
                ret[k] = v;
            });
            return ret;
        };

        const updateView = function (html) {
            document.getElementById("view").innerHTML = html;
        };

        const errorOAuth = function (message) {
            updateView(
                "<p class='error'>" + (message || "GASログインに失敗しました。") + "</p>" +
                "<a class='btn' href='/index'>ログイン画面に戻る</a>"
            );
        };

        // アクセスデータの利用許可用リンクを表示(初回アクセス対応).
        // JSONPが失敗する(=GASの初回利用許可画面が割り込んだ)場合、
        // JSONP経由ではその画面を扱えないため、別タブで直接GASの
        // 許可用URLを開いてもらう必要がある.
        const viewAllowAccessData = function (params) {
            updateView(
                "<p>初回利用にはアクセスデータの利用許可が必要です。</p>" +
                "<a class='btn' href='" + params.allowAd +
                "' target='_blank' rel='noopener'>アクセスデータの利用許可</a>" +
                "<p style='margin-top:1rem;'>許可後、下のボタンからやり直してください。</p>" +
                "<a class='btn' href='/index'>ログイン画面に戻る</a>"
            );
        };

        const oauthLogin = function (params) {
            if (!params.oauthUrl || !params.allowAd) {
                errorOAuth("パラメータが不足しています。");
                return;
            }
            try {
                jsonp(params.oauthUrl, function (value) {
                    // jsonpコールバック結果.
                    try {
                        if (value.status != 200) {
                            errorOAuth(value.message);
                            return;
                        }
                        // 正常取得の場合、検証・ログイン処理側へリダイレクト.
                        location.href = "/resultOAuth" +
                            "?mail=" + encodeURIComponent(value["mail"]) +
                            "&redirectToken=" + encodeURIComponent(value["redirectToken"]) +
                            "&type=" + encodeURIComponent(value["type"]) +
                            "&tokenKey=" + encodeURIComponent(value["tokenKey"]) +
                            "&srcURL=" + encodeURIComponent(value["srcURL"] || "");
                    } catch (e) {
                        console.error("[error]oauthログイン処理でエラーが発生しました", e);
                        errorOAuth();
                    }
                }, function () {
                    // ロード成功(GASからjsonpコールバックが正しく返ってきた).
                }, function () {
                    // ロード失敗(タイムアウト).
                    // GASの初回利用許可画面が割り込んだ可能性が高いので、
                    // 許可用リンクを表示する.
                    viewAllowAccessData(params);
                });
            } catch (e) {
                console.error("[error]oauthログイン処理でエラーが発生しました", e);
                errorOAuth();
            }
        };

        oauthLogin(httpGetParams());
    </script>
</body>

</html>
